<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết bài viết</title>
<link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
<style>
.news-detail *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

.news-detail{
  background:#f5f7fb;
  padding-bottom:40px;
}

html{ scroll-behavior:smooth; }
body{ -webkit-tap-highlight-color: transparent; }

/* ===== HERO ===== */
.nd-hero{
  height:180px;
  background:linear-gradient(135deg,#2e7d32,#14532d);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-align:center;
}

.nd-hero h1{
  font-size:28px;
  font-weight:700;
}

/* ===== CONTAINER ===== */
.nd-container{
  max-width:1200px;
  margin:auto;
  padding:20px 16px;
}

/* ===== LAYOUT ===== */
.nd-layout{
  display:grid;
  grid-template-columns: 3fr 1.2fr;
  gap:24px;
}

/* ===== ARTICLE ===== */
.nd-article{
  background:#fff;
  border-radius:14px;
  padding:28px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.nd-title{
  font-size:26px;
  font-weight:700;
  color:#1f6f43;
  margin-bottom:10px;
}

.nd-meta{
  font-size:13px;
  color:#777;
  margin-bottom:18px;
}

.nd-thumb{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:18px;
}

.nd-content{
  font-size:15px;
  line-height:1.8;
  color:#444;
}

.nd-content h3{
  margin:18px 0 8px;
  color:#1f6f43;
}

.nd-content p{
  margin-bottom:10px;
}

/* ===== TAGS ===== */
.nd-tags{
  margin-top:20px;
  padding-top:15px;
  border-top:1px solid #eee;
}

.nd-tag{
  display:inline-block;
  background:#e8f5ef;
  color:#1f6f43;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  margin:3px;
}

/* ===== SHARE ===== */
.nd-share{
  margin-top:15px;
  display:flex;
  gap:8px;
  align-items:center;
}

.nd-share button{
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  color:white;
}

.nd-fb{background:#1877f2;}
.nd-tw{background:#1da1f2;}
.nd-copy{background:#16a085;}

/* ===== CTA ===== */
.nd-cta{
  margin-top:25px;
  background:linear-gradient(90deg,#1f6f43,#38b46b);
  color:white;
  padding:20px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nd-phone{
  background:white;
  color:#1f6f43;
  padding:10px 16px;
  border-radius:40px;
  font-weight:700;
}

/* ===== SIDEBAR ===== */
.nd-sidebar{
  display:flex;
  flex-direction:column;
  gap:18px;
}

@media(min-width:900px){
  .nd-sidebar{
    position:sticky;
    top:100px;
  }
}

.nd-card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.nd-card h3{
  margin-bottom:10px;
  color:#1f6f43;
}

/* ===== TOC ===== */
.nd-toc{
  max-height:250px;
  overflow-y:auto;
}

.nd-toc li{
  margin-bottom:6px;
  cursor:pointer;
}

.nd-toc li:hover{
  color:#1f6f43;
}

/* ===== LATEST ===== */
.nd-latest{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.nd-latest img{
  width:60px;
  height:45px;
  object-fit:cover;
  border-radius:6px;
}

.nd-latest a{
  text-decoration:none;
  color:#222;
  font-size:13px;
  font-weight:600;
}

/* ===== RELATED ===== */
.nd-related{
  margin-top:40px;
}

.nd-related h3{
  margin-bottom:16px;
}

.nd-related-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.nd-related-card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.25s;
}

.nd-related-card:hover{
  transform:translateY(-5px);
  box-shadow:0 14px 30px rgba(0,0,0,0.12);
}

.nd-related-card a{
  text-decoration:none;
  color:#1f6f43;
}

.nd-related-card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.nd-related-card h4{
  padding:12px;
  font-size:14px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .nd-layout{grid-template-columns:1fr;}
  .nd-title{font-size:20px;}
  .nd-thumb{height:200px;}
  .nd-cta{flex-direction:column;text-align:center;gap:10px;}
  .nd-phone{width:100%;}
}
</style>
</head>

<body>

<div id="header"></div>

<div class="news-detail">

  <!-- HERO -->
  <div class="nd-hero">
    <h1>Tin Tức Làm Vườn</h1>
  </div>

  <div class="nd-container">

    <div class="nd-layout">

      <div class="nd-article" id="article"></div>

      <div class="nd-sidebar">

        <div class="nd-card">
          <h3>📌 Mục lục</h3>
          <ol class="nd-toc" id="toc"></ol>
        </div>

        <div class="nd-card">
          <h3>🆕 Bài viết mới</h3>
          <div id="latest"></div>
        </div>

      </div>

    </div>

    <div class="nd-related">
      <h3>Bài viết liên quan</h3>
      <div class="nd-related-grid" id="related"></div>
    </div>

  </div>
</div>

<div id="footer"></div>

<script>
fetch("header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);

const slug=new URLSearchParams(location.search).get("slug");

fetch("news.json").then(r=>r.json()).then(data=>{
  const news=data.news;
  const post=news.find(n=>n.slug===slug)||news[0];

  let html="";
  const lines=post.content.split("\n");

  lines.forEach((line,i)=>{
    if(line.startsWith("##")){
      const id="sec"+i;
      html+=`<h3 id="${id}">${line.replace("##","")}</h3>`;
    }else{
      html+=`<p>${line}</p>`;
    }
  });

  article.innerHTML=`
    <div class="nd-title">${post.title}</div>
    <div class="nd-meta">📅 ${post.date} • ⏱ ${post.readingTime} phút • 👁 ${post.views}</div>
    <img class="nd-thumb" src="assets/images/${post.image}">
    <div class="nd-content">${html}</div>

    <div class="nd-tags">
      ${[post.category,"chăm sóc cây","làm vườn"].map(t=>`<span class="nd-tag">${t}</span>`).join("")}
    </div>

    <div class="nd-share">
      <span>Chia sẻ:</span>
      <button class="nd-fb">Facebook</button>
      <button class="nd-tw">Twitter</button>
      <button class="nd-copy" onclick="copyLink()">Copy</button>
    </div>

    <div class="nd-cta">
      <div><b>🌿 Cần chăm sóc vườn?</b><br>Hỗ trợ tận nơi</div>
      <div class="nd-phone">0775 472 347</div>
    </div>
  `;

  document.querySelectorAll(".nd-content h3").forEach(h=>{
    toc.innerHTML+=`<li onclick="scrollToId('${h.id}')">${h.innerText}</li>`;
  });

  news.slice(0,5).forEach(n=>{
    latest.innerHTML+=`
      <div class="nd-latest">
        <img src="assets/images/${n.image}">
        <a href="?slug=${n.slug}">${n.title}</a>
      </div>
    `;
  });

  news.filter(n=>n.slug!==slug).slice(0,3).forEach(n=>{
    related.innerHTML+=`
      <div class="nd-related-card">
        <a href="?slug=${n.slug}">
          <img src="assets/images/${n.image}">
          <h4>${n.title}</h4>
        </a>
      </div>
    `;
  });

});

function scrollToId(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("Đã copy!");
}
</script>

</body>
</html>
