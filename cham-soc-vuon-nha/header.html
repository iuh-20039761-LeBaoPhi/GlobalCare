<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Header Chuẩn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* ===== HEADER ===== */
.header{
position:sticky;
top:0;
background:#fff;
height:95px;
display:flex;
align-items:center;
border-bottom:1px solid #eee;
z-index:1000;
}

.container{
max-width:1300px;
margin:auto;
padding:0 20px;
display:flex;
align-items:center;
justify-content:space-between;
width:100%;
}

/* ===== LOGO ===== */
.logo{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
}

.logo img{
height:50px;
}

.logo span{
font-size:24px;
font-weight:700;
color:#111;
}

/* ===== MENU ===== */
.nav{
display:flex;
align-items:center;
gap:5px;
}

.nav a{
text-decoration:none;
color:#222;
padding:10px 16px;
font-size:16px;
font-weight:500;
position:relative;
}

/* hover */
.nav a:hover{
color:#2e7d32;
}

/* active đẹp */
.nav a.active{
color:#2e7d32;
font-weight:600;
}

.nav a.active::after{
content:"";
position:absolute;
bottom:-5px;
left:0;
width:100%;
height:3px;
background:#2e7d32;
border-radius:10px;
}

/* Trang chủ nổi bật */
.nav a.home{
color:#2e7d32;
font-weight:700;
}

/* ===== LOGIN ===== */
.login-box{
position:relative;
}

.login-btn{
background:#2e7d32;
color:#fff;
border:none;
padding:10px 22px;
border-radius:25px;
font-weight:600;
cursor:pointer;
font-size:15px;
}

/* dropdown */
.login-menu{
position:absolute;
top:55px;
right:0;
background:#fff;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
width:220px;
display:none;
flex-direction:column;
overflow:hidden;
}

.login-menu.show{
display:flex;
}

.login-menu a{
padding:12px 18px;
text-decoration:none;
color:#333;
font-size:14px;
}

.login-menu a:hover{
background:#f2f7f3;
color:#2e7d32;
}

/* ===== MOBILE ===== */
.menu-btn{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
}

.menu-btn span{
width:25px;
height:3px;
background:#111;
}

/* mobile menu */
.mobile-menu{
position:fixed;
top:0;
left:-100%;
width:260px;
height:100%;
background:#fff;
box-shadow:0 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
z-index:2000;
}

.mobile-menu.show{
left:0;
}

.mobile-menu a{
display:block;
padding:12px 0;
text-decoration:none;
color:#222;
font-weight:500;
border-bottom:1px solid #eee;
}

/* responsive */
@media(max-width:992px){

.nav{
display:none;
}

.menu-btn{
display:flex;
}

}

</style>
</head>

<body>

<header class="header">
<div class="container">

<!-- LOGO -->
<a href="../index.html" class="logo">
<img src="assets/images/logo1.jpg">
<span>Chăm Sóc Vườn</span>
<img src="assets/images/logo2.jpg">
</a>

<!-- MENU -->
<nav class="nav">
<a href="indexs.html" class="home active">Trang chủ</a>
<a href="gioithieu.html">Giới thiệu</a>
<a href="dichvu.html">Dịch vụ</a>
<a href="tintuc.html">Tin tức</a>
<a href="datlich.html">Đặt lịch</a>
<a href="lienhe.html">Liên hệ</a>
</nav>

<!-- RIGHT -->
<div style="display:flex;align-items:center;gap:15px;">

<!-- LOGIN -->
<div class="login-box">
<button class="login-btn" id="loginBtn">Đăng nhập</button>

<div class="login-menu" id="loginMenu">
<a href="login_customer.html">👤 Khách hàng</a>
<a href="admin/login_admin.html">🛡 Quản trị viên</a>
</div>
</div>

<!-- MENU BUTTON -->
<div class="menu-btn" id="menuBtn">
<span></span>
<span></span>
<span></span>
</div>

</div>

</div>
</header>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
<a href="indexs.html">Trang chủ</a>
<a href="gioithieu.html">Giới thiệu</a>
<a href="dichvu.html">Dịch vụ</a>
<a href="tintuc.html">Tin tức</a>
<a href="datlich.html">Đặt lịch</a>
<a href="lienhe.html">Liên hệ</a>
</div>

<script>

/* LOGIN DROPDOWN */
const loginBtn = document.getElementById("loginBtn");
const loginMenu = document.getElementById("loginMenu");

loginBtn.onclick = (e)=>{
e.stopPropagation();
loginMenu.classList.toggle("show");
};

document.onclick = ()=>{
loginMenu.classList.remove("show");
};

/* MOBILE MENU */
const menuBtn = document.getElementById("menuBtn");
const mobileMenu = document.getElementById("mobileMenu");

menuBtn.onclick = ()=>{
mobileMenu.classList.toggle("show");
};

</script>

</body>
</html>
