<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Hóa Đơn - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .lookup-detail-modal .modal-content {
            border: 0;
            background: linear-gradient(180deg, #fff7f7 0%, #fff3f3 100%);
            box-shadow: 0 10px 30px rgba(153, 32, 32, .15);
        }

        .lookup-detail-modal .modal-header,
        .lookup-detail-modal .modal-footer {
            background: #f8d7da;
        }

        #lookupInvoiceDetailContent,
        #lookupEmployeeDetailContent {
            background: #fff7f7;
            border-radius: .75rem;
            padding: .25rem;
        }

        .lookup-employee-avatar {
            width: 128px;
            height: 128px;
        }

        .lookup-invoice-card .card-body,
        .lookup-employee-summary-card .card-body {
            font-size: 1rem;
        }

        .lookup-modal-dialog-employee {
            margin: 1rem auto;
        }

        .lookup-modal-dialog-invoice {
            margin: 1rem auto;
        }

        @media (max-width: 576px) {
            .lookup-modal-dialog-employee,
            .lookup-modal-dialog-invoice {
                width: 94vw;
                max-width: 94vw;
                margin: .75rem auto;
            }

            #lookupEmployeeDetailContent,
            #lookupInvoiceDetailContent {
                max-height: 72vh;
                overflow: auto;
                padding: 0;
            }

            .lookup-employee-avatar {
                width: 92px;
                height: 92px;
            }

            .lookup-invoice-card .card-body,
            .lookup-employee-summary-card .card-body {
                font-size: .92rem;
            }

            .lookup-invoice-card .badge,
            .lookup-employee-summary-card .badge,
            #lookupEmployeeDetailContent .badge {
                font-size: .75rem !important;
            }

            .lookup-invoice-card-header h6,
            #lookupEmployeeDetailModal .card-header h6,
            #lookupInvoiceDetailModal .card-header h6 {
                font-size: .98rem;
            }
        }
    </style>
</head>
<body class="bg-danger-subtle">
    <div class="modal fade" id="lookupModal" tabindex="-1" aria-labelledby="lookupModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
            <div class="modal-content border-0 rounded-4 shadow bg-white">
                <div class="modal-header border-0 bg-danger-subtle px-3 px-md-4 py-3">
                    <div>
                        <h4 class="mb-1 text-danger-emphasis" id="lookupModalLabel">Tra Cứu Hóa Đơn</h4>
                        <p class="text-secondary small mb-0">Nhập số điện thoại để tra cứu thông tin hóa đơn</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-3 p-md-4 bg-danger-subtle">
                    <div class="card border-danger-subtle shadow-sm mb-3">
                        <div class="card-body">
                            <form id="lookupForm">
                                <div class="row g-3">
                                    <div class="col-md-8">
                                        <input type="tel" class="form-control" id="phone" placeholder="Nhập số điện thoại (VD: 0123456789)" required>
                                    </div>
                                    <div class="col-md-4">
                                        <button type="submit" class="btn btn-danger w-100">
                                            <i class="bi bi-search me-2"></i>Tra cứu
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div id="resultContainer">
                        <div class="d-none d-md-block">
                            <div class="card border-danger-subtle shadow-sm">
                                <div class="card-body p-2 p-md-3">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0" style="font-size: 14px;">
                                            <thead>
                                                <tr>
                                                    <th>Tên khách hàng</th>
                                                    <th>Gói dịch vụ</th>
                                                    <th>Ngày bắt đầu</th>
                                                    <th>Tổng tiền</th>
                                                    <th>Trạng thái</th>
                                                    <th>Tên nhân viên</th>
                                                    <th>Hành động</th>
                                                </tr>
                                            </thead>
                                            <tbody id="lookupInvoicesTable">
                                                <tr><td colspan="7" class="text-center text-muted py-4">Nhập số điện thoại để tra cứu hóa đơn</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-md-none">
                            <div class="card border-danger-subtle shadow-sm">
                                <div class="card-body text-center text-muted py-4">
                                    Nhập số điện thoại để tra cứu hóa đơn
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer border-0 pt-0 px-3 px-md-4 pb-3 pb-md-4 bg-danger-subtle justify-content-between">
                    <!-- <a href="dshoadon.html" class="text-danger text-decoration-none fw-semibold">
                        <i class="bi bi-arrow-left me-1"></i>Quay lại trang chủ
                    </a> -->
                    <button type="button" class="btn btn-outline-danger" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade lookup-detail-modal" id="lookupEmployeeDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable lookup-modal-dialog-employee">
            <div class="modal-content">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-person-badge-fill me-2"></i>Thông Tin Nhân Viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="lookupEmployeeDetailContent"></div>
            </div>
        </div>
    </div>

    <div class="modal fade lookup-detail-modal" id="lookupInvoiceDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable lookup-modal-dialog-invoice">
            <div class="modal-content">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-file-text-fill me-2"></i>Chi Tiết Hóa Đơn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="lookupInvoiceDetailContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/lookup-modal-core.js"></script>
</body>
</html>
