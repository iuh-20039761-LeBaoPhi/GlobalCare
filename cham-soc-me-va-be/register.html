<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            margin: 0 auto;
            padding: 50px;
        }
        .form-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
            text-align: center;
        }
        .form-subtitle {
            color: #666;
            margin-bottom: 40px;
            text-align: center;
        }
        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .login-link {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }
        .login-link:hover {
            text-decoration: underline;
        }
        .input-icon .input-group-text {
            border: 2px solid #e0e0e0;
            border-right: 0;
            border-radius: 10px 0 0 10px;
            background: #f8fafc;
            color: #64748b;
            min-width: 48px;
            justify-content: center;
        }
        .input-icon .form-control {
            border-left: 0;
            border-radius: 0 10px 10px 0;
        }
        .input-icon .form-control:focus {
            box-shadow: none;
        }
        .input-icon:focus-within .input-group-text,
        .input-icon:focus-within .form-control,
        .input-icon:focus-within .toggle-pwd {
            border-color: #667eea;
        }
        .toggle-pwd {
            border: 2px solid #e0e0e0;
            border-left: 0;
            border-radius: 0 10px 10px 0;
            background: #fff;
            color: #64748b;
            min-width: 52px;
        }
        .toggle-pwd:hover {
            color: #4c51bf;
            background: #f8fafc;
        }
        .strength-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 999px;
            margin-top: 10px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0;
            transition: width 0.25s ease, background 0.25s ease;
        }
        #msg {
            min-height: 24px;
            margin-top: 12px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .register-container {
                padding: 28px 20px;
            }
            .form-title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2 class="form-title">Đăng Ký Tài Khoản</h2>
        <p class="form-subtitle">Tạo tài khoản mới để sử dụng hệ thống</p>
        
        <form id="registerForm" onsubmit="return false;">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                    <div class="input-group input-icon">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" id="full_name" class="form-control" placeholder="Nhập tên" autocomplete="name" required>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <div class="input-group input-icon">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="email" class="form-control" placeholder="Nhập email" autocomplete="email" required>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                    <div class="input-group input-icon">
                        <span class="input-group-text"><i class="fas fa-phone"></i></span>
                        <input type="tel" id="sodienthoai" class="form-control" placeholder="Nhập số điện thoại" autocomplete="tel" required>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Loại tài khoản <span class="text-danger">*</span></label>
                    <div class="input-group input-icon">
                        <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                        <select id="account_type" class="form-select" required>
                            <option value="khachhang" selected>Khách hàng</option>
                            <option value="nhanvien">Nhân viên</option>
                        </select>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                    <div class="input-group input-icon">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Ít nhất 6 ký tự" autocomplete="new-password" required>
                        <button class="btn toggle-pwd" type="button" id="togglePwd">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                </div>

                <div class="col-12">
                    <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                    <div class="input-group input-icon">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu" autocomplete="new-password" required>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-primary btn-register w-100 mt-3" id="registerBtn">
                <i class="fas fa-user-plus me-2"></i>Tạo tài khoản
            </button>
            <div id="msg"></div>
        </form>
        
        <div class="text-center mt-4">
            <p class="mb-0">Đã có tài khoản? <a href="login.html" class="login-link">Đăng nhập ngay</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script>
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const fill = document.getElementById('strengthFill');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            const colors = ['', '#e53e3e', '#ed8936', '#48bb78', '#11998e'];
            const widths = ['0%', '25%', '50%', '75%', '100%'];
            fill.style.width = widths[strength];
            fill.style.background = colors[strength] || 'transparent';
        });

        const BANG_DANG_KY_KHACH_HANG = 'khachhang';
        const BANG_DANG_KY_NHAN_VIEN = 'nhacungcap_mevabe';

        document.getElementById('registerBtn').addEventListener('click', register);

        function nowSql() {
            const d = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        function normalizePhone(value) {
            return String(value || '').replace(/\s+/g, '');
        }

        function isValidPhone(phone) {
            return /^(0|\+84)[0-9]{9}$/.test(phone);
        }

        function isKrudSuccess(res) {
            return !!res && !res.error && res.success !== false;
        }

        function register() {
            const full_name        = document.getElementById('full_name').value.trim();
            const email            = document.getElementById('email').value.trim();
            const phone            = normalizePhone(document.getElementById('sodienthoai').value);
            const account_type     = document.getElementById('account_type').value;
            const password         = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('msg');

            if (!full_name || !email || !phone || !account_type || !password || !confirm_password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng điền đầy đủ thông tin</span>';
                return;
            }
            if (password.length < 6) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Mật khẩu phải có ít nhất 6 ký tự</span>';
                return;
            }
            if (password !== confirm_password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Mật khẩu xác nhận không khớp</span>';
                return;
            }

            if (!isValidPhone(phone)) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Số điện thoại không hợp lệ</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang tạo tài khoản...';
            msg.innerHTML = '';

            if (typeof krud !== 'function') {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>Không tải được hàm KRUD</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
                return;
            }

            const payload = {
                hovaten: full_name,
                email: email.toLowerCase(),
                sodienthoai: phone,
                matkhau: password,
                created_date: nowSql()
            };

            const bangDangKy = account_type === 'nhanvien'
                ? BANG_DANG_KY_NHAN_VIEN
                : BANG_DANG_KY_KHACH_HANG;

            krud('insert', bangDangKy, payload)
                .then((res) => {
                    console.log(res);
                    if (!isKrudSuccess(res)) {
                        throw new Error(res && (res.message || res.error) ? (res.message || res.error) : 'Đăng ký thất bại');
                    }

                    localStorage.setItem('customer_logged_in', 'true');
                    localStorage.setItem('customer_name', full_name);
                    localStorage.setItem('profile', JSON.stringify({
                        name: full_name,
                        phone: phone,
                        address: ''
                    }));

                    msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng ký thành công! Đang chuyển hướng...</span>';
                    setTimeout(() => window.location.href = 'index.html', 1000);
                })
                .catch((err) => {
                    msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (err && err.message ? err.message : 'Không kết nối được server') + '</span>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
                });
        }
    </script>
</body>
</html>
