<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid min-vh-100 bg-danger-subtle"></div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 rounded-4 overflow-hidden">
                <div class="row g-0">
                    <div class="col-12 col-md-5 position-relative">
                        <img src="assets/cham-be.png" class="img-fluid w-100 h-100 object-fit-cover" alt="Hình ảnh chăm sóc mẹ và bé">
                        <div class="position-absolute top-0 start-0 m-3 p-2 bg-white rounded-circle shadow-sm">
                            <img src="assets/logomvb.png" alt="Logo Chăm Sóc Mẹ và Bé" width="52" height="52" class="rounded-circle">
                        </div>
                    </div>
                    <div class="col-12 col-md-7 bg-danger-subtle p-4 p-md-5">
                        <div class="d-flex align-items-start justify-content-between mb-2">
                            <h3 class="h4 fw-bold text-danger-emphasis mb-0" id="loginModalLabel">Đăng Nhập</h3>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <p class="text-secondary mb-4">Chào mừng trở lại! Vui lòng đăng nhập vào tài khoản của bạn.</p>

                        <div id="alertContainer"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên đăng nhập</label>
                                <input type="text" class="form-control form-control-lg border-danger-subtle" id="username" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" class="form-control form-control-lg border-danger-subtle" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-danger btn-lg w-100">Đăng Nhập</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0 text-secondary">Chưa có tài khoản? <a href="register.html" class="link-danger fw-semibold text-decoration-none">Đăng ký ngay</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/login-modal-core.js"></script>
</body>
</html>
