<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giặt Ủi Nhanh - Quản lý nhà cung cấp</title>
    <link rel="stylesheet" href="../public/asset/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../public/asset/css/admin-dashboard.css" />
  </head>
  <body>
    <div class="admin-shell">
      <div
        id="asideMount"
        data-aside-src="partials/aside.html"
        data-logo-src="../public/asset/image/logo-sua-xe-luu-dong.png"
        data-logout-href="dang-nhap-admin.html"
        data-logout-api="../public/logout.php"
      ></div>

      <main class="content-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="btn btn-sm sidebar-toggler d-lg-none"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#sidebar"
              aria-controls="sidebar"
              aria-label="Mở menu"
            >
              <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <h2>Quản lý nhà cung cấp</h2>
          </div>

          <div class="topbar-actions">
            <div class="admin-chip">
              <span class="admin-avatar">A</span>
              <span class="admin-email">admin@giatuinhanh.vn</span>
            </div>
          </div>
        </header>

        <section class="container-fluid py-3 py-lg-4">
          <div class="row g-3 stats-grid mb-3" id="supplierStatsGrid"></div>

          <article class="panel-card">
            <div
              class="panel-head d-flex flex-wrap gap-2 justify-content-between align-items-center"
            >
              <h3>
                <i class="fas fa-user-tie" aria-hidden="true"></i> Danh sách nhà
                cung cấp
              </h3>
              <div class="d-flex gap-2 flex-wrap">
                <input
                  type="text"
                  class="form-control"
                  id="supplierKeyword"
                  placeholder="Tìm theo tên, SĐT, email, cửa hàng"
                  style="min-width: 280px"
                />
              </div>
            </div>

            <div
              id="supplierAlert"
              class="alert d-none mx-3 mt-3 mb-0"
              role="alert"
            ></div>

            <div class="table-responsive mt-3">
              <table class="table table-hover align-middle mb-0">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Họ tên</th>
                    <th>Số điện thoại</th>
                    <th>Email</th>
                    <th>Cửa hàng</th>
                    <th>Địa chỉ</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                  </tr>
                </thead>
                <tbody id="supplierTableBody"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="../public/asset/js/bootstrap.bundle.min.js"></script>
    <script src="../public/asset/js/admin-layout.js"></script>
    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script src="../public/asset/js/admin-suppliers.js"></script>
    <script src="../public/asset/js/plugin/webfont/webfont.min.js"></script>
    <script>
      WebFont.load({
        google: {
          families: ["Public Sans:300,400,500,600,700"],
        },
        custom: {
          families: [
            "Font Awesome 5 Solid",
            "Font Awesome 5 Regular",
            "Font Awesome 5 Brands",
            "simple-line-icons",
          ],
          urls: ["../public/asset/css/fonts.min.css"],
        },
        active: function () {
          sessionStorage.fonts = true;
        },
      });
    </script>
  </body>
</html>
