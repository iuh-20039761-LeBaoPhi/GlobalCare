<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thợ Nhà - Chi tiết hóa đơn dịch vụ</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="../public/asset/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/admin-dashboard.css?v=1.4" />
    <link rel="stylesheet" href="assets/css/order-panel.css?v=1.4" />
    <link rel="stylesheet" href="assets/css/order-detail-custom.css?v=1.4" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-emerald: #10b981;
            --deep-emerald: #059669;
            --slate-800: #1e293b;
            --slate-500: #64748b;
            --slate-100: #f1f5f9;
            --soft-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
            --premium-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body.order-standalone-page {
            margin: 0;
            min-height: 100vh;
            background: #f8fafc;
            /* Slate 50 */
            color: var(--slate-800);
            font-family: "Public Sans", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .standalone-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #065f46, var(--deep-emerald));
            box-shadow: 0 4px 20px rgba(5, 150, 105, 0.2);
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .standalone-header-inner {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 90px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .standalone-logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .standalone-logo {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .standalone-title-wrap {
            text-align: center;
            flex-grow: 1;
        }

        .standalone-title {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .standalone-subtitle {
            margin: 2px 0 0;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.85;
            letter-spacing: 0.05em;
        }

        .standalone-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 10px 20px;
        }

        .standalone-topline {
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--slate-500);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 12px;
            background: #fff;
            box-shadow: var(--soft-shadow);
        }

        .back-btn:hover {
            color: var(--deep-emerald);
            transform: translateX(-5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .standalone-chip {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border-radius: 16px;
            background: #ffffff;
            padding: 10px 20px;
            color: var(--slate-800);
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: var(--soft-shadow);
            border: 1px solid var(--slate-100);
        }

        .standalone-chip b {
            color: var(--deep-emerald);
            background: #ecfdf5;
            padding: 2px 10px;
            border-radius: 8px;
            font-weight: 800;
        }

        /* Định dạng các thành phần trong Partial */
        .order-detail-shell {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 1. Hero Section - Khu vực tổng quan */
        .invoice-hero {
            background: #fff;
            border-radius: 28px;
            padding: 20px;
            box-shadow: var(--premium-shadow);
            margin-bottom: 5px;
            border: 1px solid var(--slate-100);
            position: relative;
            overflow: hidden;
        }

        .invoice-hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
            border-radius: 50%;
        }

        .invoice-code {
            color: var(--slate-800);
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.03em;
        }

        .invoice-service {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--deep-emerald);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .invoice-service::before {
            content: '\f0ad';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        /* 2. Panels - Các bảng thông tin chi tiết */
        .invoice-panel {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--soft-shadow);
            border: 1px solid var(--slate-100);
            height: 100%;
            transition: transform 0.3s ease;
        }

        .invoice-panel:hover {
            transform: translateY(-5px);
        }

        .invoice-panel-head {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--slate-100);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .invoice-panel-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--slate-800);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 3. Identity Cards - Thông tin khách & thợ */
        .identity-card {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--soft-shadow);
            border: 1px solid var(--slate-100);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .avatar-badge {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary-emerald), var(--deep-emerald));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2);
        }

        .identity-name {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--slate-800);
            margin-bottom: 8px;
        }

        /* 4. Chips & Badges */
        .panel-chip {
            background: var(--slate-100);
            color: var(--slate-500);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .panel-chip.warn {
            background: #fef2f2;
            color: #ef4444;
        }

        /* KPI Cards */
        .hero-kpi {
            background: var(--slate-100);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .hero-kpi:hover {
            background: #fff;
            border-color: var(--primary-emerald);
            box-shadow: var(--soft-shadow);
        }

        .hero-kpi-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--slate-500);
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .hero-kpi-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--slate-800);
            margin: 0;
        }

        /* Hero Content Layouts */
        .invoice-hero-top {
            display: grid;
            gap: 30px;
        }

        @media (min-width: 992px) {
            .invoice-hero-top {
                grid-template-columns: 1fr auto;
                align-items: flex-start;
            }
        }

        .invoice-hero-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 5px;
            margin-top: 5px;
        }

        .invoice-code-line {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .invoice-service-meta {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 5px;
            margin-top: 5px;
            border-top: 1px dashed var(--slate-100);
            padding-top: 5px;
        }

        .invoice-service-meta-item {
            font-size: 0.85rem;
            color: var(--slate-500);
            margin: 0;
            display: flex;
            justify-content: space-between;
            padding-right: 15px;
        }

        .invoice-service-meta-item strong {
            color: var(--slate-800);
        }

        /* 5. Giao diện danh sách & Lưới */
        .invoice-main-grid,
        .identity-grid,
        .review-grid {
            display: grid;
            gap: 5px;
            margin-bottom: 5px;
        }

        @media (min-width: 768px) {

            .invoice-main-grid,
            .identity-grid,
            .review-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-list li {
            padding: 12px 18px;
            background: var(--slate-100);
            border-radius: 12px;
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--primary-emerald);
        }

        .task-list li::before {
            content: '\f058';
            font-family: 'Font Awesome 6 Free';
            color: var(--primary-emerald);
        }

        .review-card {
            background: var(--slate-100);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .review-card:hover {
            background: #fff;
            border-color: var(--primary-emerald);
            box-shadow: var(--soft-shadow);
        }

        .review-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--slate-500);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .review-value {
            font-size: 0.95rem;
            color: var(--slate-800);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        /* Loading & Error States hiện đại hơn */
        .state-container {
            text-align: center;
            padding: 80px 40px;
            background: #fff;
            border-radius: 30px;
            box-shadow: var(--premium-shadow);
            border: 1px solid var(--slate-100);
        }

        .state-icon {
            font-size: 4.5rem;
            margin-bottom: 25px;
            color: var(--slate-100);
        }

        .fa-spinner {
            color: var(--primary-emerald) !important;
        }

        .not-found .state-icon {
            color: #fee2e2;
        }

        .not-found h3 {
            color: #991b1b;
            font-weight: 800;
        }

        [hidden] {
            display: none !important;
        }

        #detailContainer .detail-nav {
            display: none !important;
        }
    </style>
</head>

<body class="order-standalone-page">
    <header class="standalone-header">
        <div class="standalone-header-inner">
            <img class="standalone-logo" src="../public/asset/image/logo-dich-vu-quanh-ta.png" alt="Logo DVQT" />
            <div class="standalone-title-wrap">
                <h1 class="standalone-title">Chi tiết hóa đơn Thợ Nhà</h1>
                <p class="standalone-subtitle">Hệ thống quản lý dịch vụ tại gia chuyên nghiệp</p>
            </div>
            <a href="index.html">
                <img class="standalone-logo" src="assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Logo Thợ Nhà" />
            </a>
        </div>
    </header>

    <main class="standalone-content">
        <div class="standalone-topline">
            <a href="javascript:history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i> Quay lại danh sách
            </a>
            <p class="standalone-chip mb-0">
                Quyền truy cập: <b id="accessRole">---</b>
                <span class="mx-2" style="opacity:0.3">|</span>
                Đang xem đơn: <span id="accessCode" class="text-primary">#-------</span>
            </p>
        </div>

        <!-- 1. Loading State -->
        <div id="stateLoading" class="state-container">
            <i class="fas fa-spinner fa-spin state-icon"></i>
            <h3>Đang tải dữ liệu...</h3>
            <p>Vui lòng đợi trong giây lát</p>
        </div>

        <!-- 2. Error State -->
        <div id="stateError" class="state-container not-found" hidden>
            <i class="fas fa-exclamation-triangle state-icon"></i>
            <h3 id="errorTitle">Không tìm thấy hóa đơn</h3>
            <p id="errorMessage">Vui lòng kiểm tra lại mã đơn hàng hoặc quyền truy cập của bạn.</p>
            <a href="pages/customer/trang-ca-nhan.html" class="btn btn-primary mt-4 px-4 py-2"
                style="border-radius:50px;">Về trang cá nhân</a>
        </div>

        <!-- 3. Success Content (The Partial) -->
        <div id="stateSuccess" hidden>
            <!-- Đây là cấu trúc partial chi-tiet-hoa-don-tho-nha.html sẽ được inject vào đây -->
            <div id="detailContainer"></div>
        </div>
    </main>

    <!-- JS Dependencies -->
    <script src="../public/asset/js/dvqt-krud.js"></script>
    <script src="../public/asset/js/dvqt-app.js"></script>
    <script src="assets/js/shared/order-store.js"></script>
    <script src="assets/js/shared/order-view-utils.js"></script>
    <script src="assets/js/shared/order-service.js"></script>
    <script src="assets/js/shared/order-detail-renderer.js"></script>
    <script src="assets/js/shared/order-actions.js"></script>

    <!-- Setup logic for standalone page -->
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const stateLoading = document.getElementById('stateLoading');
            const stateError = document.getElementById('stateError');
            const stateSuccess = document.getElementById('stateSuccess');
            const detailContainer = document.getElementById('detailContainer');

            // 1. Lấy tham số truy cập từ URL
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id') || urlParams.get('mahd');
            const visitorSdt = urlParams.get('sdt');
            const password = urlParams.get('password');

            if (!orderId) return showError('Missing ID', 'Cần mã hóa đơn.');

            try {
                // 2. Xác thực quyền TRỰC TIẾP (Session hiện có)
                let session = await DVQTApp.checkSession();
                const krud = window.DVQTKrud;

                // Tải dữ liệu đơn hàng
                const orders = await krud.listTable('datlich_thonha');
                const rawOrder = orders.find(o => String(o.id) === String(orderId));
                if (!rawOrder) throw new Error(`Không tìm thấy đơn hàng mã #${orderId}.`);

                let accessGranted = false;
                let identifiedRole = 'guest';

                // ƯU TIÊN 1: Xác thực thông tin từ URL (SĐT + Pass)
                let visitor = null;
                if (visitorSdt && password) {
                    const cleanVisitorSdt = visitorSdt.replace(/\D/g, '');
                    const allUsers = await krud.listTable('nguoidung');

                    // CHỐT CHẶN: Phải khớp CẢ SĐT và MẬT KHẨU của cùng 1 người
                    visitor = allUsers.find(u => {
                        const dbSdt = (u.sodienthoai || '').replace(/\D/g, '');
                        return dbSdt === cleanVisitorSdt && u.matkhau === password;
                    });

                    if (!visitor) {
                        throw new Error('Xác thực thất bại: SĐT này không tồn tại hoặc Mật khẩu không chính xác.');
                    }
                }

                // ƯU TIÊN 2: Nếu URL không có, dùng session trình duyệt (dành cho Admin hoặc người đang đăng nhập)
                if (!visitor && session) {
                    visitor = session;
                }

                // ƯU TIÊN 3: Kiểm tra quyền Admin (Luôn được phép)
                if (visitor?.role === 'admin' || session?.role === 'admin') {
                    accessGranted = true;
                    identifiedRole = 'admin';
                }

                // 4. KIỂM TRA QUYỀN SỞ HỮU / NHIỆM VỤ
                if (!accessGranted && visitor) {
                    const cleanCustSdt = (rawOrder.sdtkhachhang || '').replace(/\D/g, '').slice(-9);
                    const cleanVisitorSdtSuffix = (visitor.sodienthoai || '').replace(/\D/g, '').slice(-9);

                    const idDichVuRaw = String(visitor.id_dichvu || '0');
                    const isNhaCungCap = idDichVuRaw === '9' || idDichVuRaw.split(',').map(s => s.trim()).includes('9');
                    const providerIdOnOrder = String(rawOrder.id_nhacungcap || '').trim();

                    // TRƯỜNG HỢP A: Là thợ và đơn đang trống -> Được quyền vào xem để nhận đơn
                    if (isNhaCungCap && (!providerIdOnOrder || providerIdOnOrder === '0' || providerIdOnOrder === 'null')) {
                        accessGranted = true;
                        identifiedRole = 'provider';
                    }
                    // TRƯỜNG HỢP B: Là Khách hàng chính chủ của đơn (Khớp SĐT)
                    else if (cleanVisitorSdtSuffix && cleanVisitorSdtSuffix === cleanCustSdt) {
                        accessGranted = true;
                        identifiedRole = 'customer';
                    }
                    // TRƯỜNG HỢP C: Là thợ ĐÃ NHẬN đơn này (Khớp ID thợ)
                    else if (isNhaCungCap && String(visitor.id) === providerIdOnOrder) {
                        accessGranted = true;
                        identifiedRole = 'provider';
                    }
                }

                if (!accessGranted) {
                    throw new Error('Bạn không có quyền truy cập vào hóa đơn này. Vui lòng kiểm tra lại SĐT/Mật khẩu hoặc liên hệ Quản trị viên.');
                }

                // Gán phiên làm việc cuối cùng cho các module xử lý
                session = { ...visitor, role: identifiedRole };

                // 3. Render giao diện Premium
                const partialRes = await fetch('partials/chi-tiet-hoa-don-tho-nha.html');
                if (!partialRes.ok) throw new Error('Không thể tải giao diện chi tiết.');
                detailContainer.innerHTML = await partialRes.text();

                const providers = await DVQTApp.getProviders('9');
                const providerIdMap = {};
                providers.forEach(p => { if (p.id) providerIdMap[p.id] = true; });

                const providerMap = ThoNhaOrderViewUtils.buildProviderMapByIds(providers, providerIdMap);
                const orderMapped = ThoNhaOrderViewUtils.mapApiOrderBase(rawOrder, 0, { providerMapById: providerMap, includeRaw: true });

                ThoNhaOrderDetailRenderer.render(orderMapped, identifiedRole, detailContainer);
                document.getElementById('accessRole').textContent = identifiedRole.toUpperCase();
                document.getElementById('accessCode').textContent = '#' + (orderMapped.orderCode || orderId);

                // 4. Khởi tạo bộ hành động (Start, Complete, ...)
                ThoNhaOrderActions.init(detailContainer, session, () => location.reload());

                stateLoading.hidden = true;
                stateSuccess.hidden = false;
            } catch (err) {
                showError('Lỗi truy cập', err.message);
            }
        });

        function showError(t, m) {
            document.getElementById('stateLoading').hidden = true;
            document.getElementById('stateError').hidden = false;
            document.getElementById('errorTitle').textContent = t;
            document.getElementById('errorMessage').textContent = m;
        }
    </script>
    </script>
</body>

</html>
