<!-- Tho Nha Customer Order Management (Master Layout 2026) -->
<div class="customer-dashboard-grid">
    
    <!-- Bước 1: Bộ lọc (Card trên cùng) -->
    <section class="dashboard-card">
        <div class="d-card-header">
            <h3 class="d-card-title"><i class="fa-solid fa-layer-group"></i> Phân loại</h3>
        </div>
        <div class="d-card-body">
            <div class="filter-pills">
                <button class="pill-item active" id="filter-all">
                    Tất cả đơn hàng <span class="pill-badge" id="stat-all-count">0</span>
                </button>
                <button class="pill-item" id="filter-new">
                    Chờ xác nhận <span class="pill-badge" id="stat-new-count">0</span>
                </button>
                <button class="pill-item" id="filter-doing">
                    Đang thực hiện <span class="pill-badge" id="stat-doing-count">0</span>
                </button>
                <button class="pill-item" id="filter-done">
                    Đã hoàn thành <span class="pill-badge" id="stat-done-count">0</span>
                </button>
            </div>
        </div>
    </section>

    <!-- Bước 2: Thanh tìm kiếm (Card độc lập - đổ bóng) -->
    <section class="dashboard-card" style="padding: 10px 24px; box-shadow: var(--shadow-sm);">
        <div class="dashboard-search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="searchInput" type="text" placeholder="Tìm theo mã đơn, dịch vụ...">
        </div>
    </section>

    <!-- Bước 3: Lịch sử đặt lịch (Card dưới cùng) -->
    <div id="orderListSection">
        <section class="dashboard-card">
            <div class="d-card-header d-flex-between" style="padding: 25px 30px;">
                <div class="d-flex align-items-center gap-4">
                    <div class="header-icon-box">
                        <i class="fa-solid fa-bag-shopping"></i>
                    </div>
                    <div>
                        <h3 class="d-card-title" style="margin-bottom:4px;">Danh sách đơn hàng thợ nhà</h3>
                        <p style="font-size: 13px; color: var(--text-sub); font-weight: 500;">Quản lý và theo dõi các đơn hàng dịch vụ sửa chữa, bảo trì trong nhà</p>
                    </div>
                </div>
                <button id="refreshCustomerBtn" class="btn-refresh-modern">
                    <i class="fa-solid fa-sync-alt"></i> Làm mới đơn
                </button>
            </div>
            
            <div class="d-card-body" style="padding: 0 30px 30px;">
                <!-- Table View -->
                <div class="d-table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th><i class="fa-solid fa-qrcode me-2" style="color: #6366f1;"></i>Mã đơn</th>
                                <th>DỊCH VỤ</th>
                                <th><i class="fa-solid fa-calendar-days me-2" style="color: #3b82f6;"></i>NGÀY ĐẶT</th>
                                <th><i class="fa-solid fa-bookmark me-2" style="color: #6366f1;"></i>TRẠNG THÁI</th>
                                <th><i class="fa-solid fa-gear me-2" style="color: #3b82f6;"></i>THAO TÁC</th>
                            </tr>
                        </thead>
                        <tbody id="customerOrderBody">
                            <!-- JS Inject -->
                        </tbody>
                    </table>
                </div>

                <!-- Mobile View -->
                <div id="customerMobileList" style="display:none;"></div>

                <div id="customerEmptyState" class="modern-empty" hidden style="text-align:center; padding:40px;">
                    <img src="https://api.dvqt.vn/images/empty-box.png" alt="Empty" style="width:80px; opacity:0.3; margin-bottom:15px;">
                    <p style="color:var(--text-sub);">Bạn chưa có đơn đặt lịch nào.</p>
                </div>
            </div>
        </section>
    </div>

    <!-- View Chi tiết (Ẩn mặc định) -->
    <div id="orderDetailSection" hidden>
        <div style="margin-bottom:20px;">
            <button class="pill-item" data-action="back-to-list" style="border:none;">
                <i class="fas fa-chevron-left"></i> Quay lại danh sách
            </button>
        </div>
        <div id="orderDetailContent"></div>
    </div>

</div>
